<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="雪泥工坊 logo">
  <defs>
    <linearGradient id="snow" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FAFD" />
      <stop offset="1" stop-color="#D7E9F1" />
    </linearGradient>
    <linearGradient id="claw" x1="140" y1="120" x2="382" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6098B3" />
      <stop offset="1" stop-color="#2F5A75" />
    </linearGradient>
  </defs>

  <!-- 雪地 -->
  <rect width="512" height="512" rx="112" fill="url(#snow)" />

  <!-- 雪丘 -->
  <path d="M0 388C120 346 200 408 300 388c80-16 152 0 212-20v164H0Z" fill="#FFFFFF" opacity="0.7" />
  <path d="M0 436C140 408 230 452 340 432c80-14 130 4 172-8v88H0Z" fill="#FFFFFF" opacity="0.55" />

  <!-- 飘雪 -->
  <circle cx="146" cy="112" r="11" fill="#FFFFFF" />
  <circle cx="392" cy="146" r="8" fill="#FFFFFF" />
  <circle cx="112" cy="252" r="7" fill="#FFFFFF" />
  <circle cx="414" cy="298" r="6" fill="#FFFFFF" opacity="0.9" />

  <!-- 鸿爪：飞鸿踏雪泥，留痕 -->
  <g
    fill="none"
    stroke="url(#claw)"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M256 322 256 132 280 119" />
    <path d="M256 322 148 176 126 159" />
    <path d="M256 322 364 176 386 159" />
    <path d="M256 322 256 402" />
  </g>
  <circle cx="256" cy="322" r="23" fill="#274F69" />
</svg>
